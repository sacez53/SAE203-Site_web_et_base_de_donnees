<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - RadioWave</title>
    <link rel="stylesheet" href="../style/connexion.css" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card">
        <a href="../index.html" class="back-link">← Retour à l'accueil</a>

        <p class="login-tag">Connexion</p>
        <h1>Heureux de te revoir</h1>
        <p class="login-intro">
          Connecte-toi pour retrouver tes radios préférées, accéder à tes
          nouveautés et profiter de ton espace personnel.
        </p>

        <form class="login-form">
          <div class="form-group">
            <label for="email">Adresse e-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="exemple@mail.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" />
              <span>Se souvenir de moi</span>
            </label>
            <a href="#">Mot de passe oublié ?</a>
          </div>

          <button type="submit" class="login-btn">Se connecter</button>
        </form>

        <p class="register-text">
          Pas encore de compte ?
          <a href="./inscription.html">Créer un compte</a>
        </p>
      </section>
    </main>
  </body>
</html>
