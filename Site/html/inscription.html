<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Créer un compte - RadioWave</title>
    <link rel="stylesheet" href="../style/inscription.css" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="register-page">
      <section class="register-card">
        <a href="../index.html" class="back-link">← Retour à l'accueil</a>

        <p class="register-tag">Créer un compte</p>
        <h1>Rejoins RadioWave</h1>
        <p class="register-intro">
          Crée ton compte pour sauvegarder tes radios préférées, retrouver tes
          derniers ajouts et profiter d’une expérience plus personnelle.
        </p>

        <form class="register-form">
          <div class="form-group">
            <label for="name">Nom d’utilisateur</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Ton pseudo"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Adresse e-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="exemple@mail.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirmer le mot de passe</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="••••••••"
              required
            />
          </div>

          <label class="terms">
            <input type="checkbox" required />
            <span>J’accepte les conditions d’utilisation et la politique de confidentialité.</span>
          </label>

          <button type="submit" class="register-btn">Créer mon compte</button>
        </form>

        <p class="login-text">
          Tu as déjà un compte ?
          <a href="./connexion.html">Se connecter</a>
        </p>
      </section>
    </main>
  </body>
</html>
